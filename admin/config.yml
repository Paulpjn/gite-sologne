backend:
  name: github
  repo: Paulpjn/gite-sologne
  branch: main
  base_url: https://gite-sologne-oauth.ppajon.workers.dev

site_url: https://paulpjn.github.io/gite-sologne

media_folder: "images"
public_folder: "/gite-sologne/images"

locale: fr

collections:
  - name: "parametres"
    label: "Paramètres du site"
    files:
      - name: "general"
        label: "Page d'accueil"
        file: "_data/general.json"
        fields:
          - { label: "Nom du gîte (navbar + pied de page)", name: "nom_gite", widget: "string" }
          - { label: "Slogan (sous-titre au-dessus du titre)", name: "slogan", widget: "string" }
          - { label: "Titre principal du hero", name: "titre_hero", widget: "string" }
          - { label: "Description courte du hero", name: "description_hero", widget: "text" }
          - { label: "Texte du bouton principal", name: "btn_principal", widget: "string" }
          - { label: "Texte du bouton secondaire", name: "btn_secondaire", widget: "string" }
          - { label: "Photo de fond du hero", name: "photo_hero", widget: "image", required: false }

      - name: "propriete"
        label: "La Propriété"
        file: "_data/propriete.json"
        fields:
          - { label: "Sous-titre (au-dessus du titre)", name: "eyebrow", widget: "string" }
          - { label: "Titre principal", name: "titre", widget: "string" }
          - { label: "Texte d'accroche (sous le titre)", name: "accroche", widget: "text" }
          - { label: "Description", name: "description", widget: "markdown" }
          - { label: "Capacité (personnes)", name: "capacite", widget: "number" }
          - { label: "Nombre de chambres", name: "chambres", widget: "number" }
          - { label: "Surface (m²)", name: "surface", widget: "number" }
          - label: "Équipements"
            name: "equipements"
            widget: "list"
            field: { label: "Équipement", name: "item", widget: "string" }
          - { label: "Photo principale", name: "photo", widget: "image", required: false }

      - name: "tarifs"
        label: "Tarifs & Disponibilités"
        file: "_data/tarifs.json"
        fields:
          - label: "Saisons et tarifs"
            name: "saisons"
            widget: "list"
            fields:
              - { label: "Nom de la saison", name: "nom", widget: "string" }
              - { label: "Période", name: "periode", widget: "string" }
              - { label: "Prix par nuit (€)", name: "prix_nuit", widget: "number" }
              - { label: "Prix par semaine (€)", name: "prix_semaine", widget: "number" }
              - { label: "Séjour minimum (nuits)", name: "sejour_min", widget: "number" }
          - { label: "Caution (€)", name: "caution", widget: "number" }
          - { label: "Taxe de séjour (€/pers/nuit)", name: "taxe_sejour", widget: "number" }
          - { label: "Informations supplémentaires", name: "infos", widget: "text", required: false }

      - name: "proprietaires"
        label: "Les Propriétaires"
        file: "_data/proprietaires.json"
        fields:
          - { label: "Prénom & Nom", name: "nom", widget: "string" }
          - { label: "Texte de présentation", name: "texte", widget: "markdown" }
          - { label: "Photo", name: "photo", widget: "image", required: false }
          - { label: "Citation personnelle", name: "citation", widget: "text", required: false }

      - name: "activites"
        label: "Activités"
        file: "_data/activites.json"
        fields:
          - { label: "Sous-titre", name: "sous_titre", widget: "string" }
          - { label: "Titre de section", name: "titre", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Liste des activités"
            name: "activites"
            widget: "list"
            fields:
              - { label: "Icône (emoji)", name: "icone", widget: "string" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image", required: false }

      - name: "localisation"
        label: "Localisation"
        file: "_data/localisation.json"
        fields:
          - { label: "Description de la section", name: "description", widget: "text" }
          - { label: "Latitude GPS", name: "latitude", widget: "number", value_type: "float", step: 0.0001 }
          - { label: "Longitude GPS", name: "longitude", widget: "number", value_type: "float", step: 0.0001 }
          - label: "Distances / Accès"
            name: "distances"
            widget: "list"
            fields:
              - { label: "Icône (emoji)", name: "icone", widget: "string" }
              - { label: "Mode de transport", name: "label", widget: "string" }
              - { label: "Détail", name: "detail", widget: "text" }

      - name: "contact"
        label: "Contact"
        file: "_data/contact.json"
        fields:
          - { label: "Email de contact", name: "email", widget: "string" }
          - { label: "Téléphone", name: "telephone", widget: "string" }
          - { label: "Adresse", name: "adresse", widget: "text" }
          - { label: "Message d'accueil", name: "message_accueil", widget: "text" }
          - { label: "Horaires de disponibilité", name: "horaires", widget: "string" }
          - { label: "Heure d'arrivée", name: "heure_arrivee", widget: "string" }
          - { label: "Heure de départ", name: "heure_depart", widget: "string" }

  - name: "galerie"
    label: "Galerie Photos"
    files:
      - name: "photos"
        label: "Photos de la galerie"
        file: "_data/galerie.json"
        fields:
          - label: "Photos Intérieur"
            name: "interieur"
            widget: "list"
            fields:
              - { label: "Titre / Légende", name: "titre", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Ordre d'affichage", name: "ordre", widget: "number", default: 1 }
          - label: "Photos Extérieur"
            name: "exterieur"
            widget: "list"
            fields:
              - { label: "Titre / Légende", name: "titre", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Ordre d'affichage", name: "ordre", widget: "number", default: 1 }

  - name: "avis"
    label: "Avis voyageurs"
    files:
      - name: "avis"
        label: "Avis de voyageurs"
        file: "_data/avis.json"
        fields:
          - label: "Avis"
            name: "avis"
            widget: "list"
            fields:
              - { label: "Auteur", name: "auteur", widget: "string" }
              - { label: "Note (sur 5)", name: "note", widget: "number", min: 1, max: 5, default: 5 }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
              - { label: "Texte de l'avis", name: "texte", widget: "text" }
